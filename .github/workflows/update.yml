name: Update Poetry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests
    - name: Fetch and deploy
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: python check_bot.py
    - name: Commit and push
      run: |
        git config user.email "bot@github.com"
        git config user.name "Poetry Bot"
        git add posts.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Обновление контента" && git push)